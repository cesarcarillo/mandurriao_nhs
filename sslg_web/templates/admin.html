<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<table border="1">
<tr><th>Position</th><th>Candidate</th><th>Total</th></tr>
{% for r in data %}
<tr><td>{{r.position}}</td><td>{{r.candidate}}</td><td>{{r.total}}</td></tr>
{% endfor %}
</table>

<canvas id="chart"></canvas>

<script>
new Chart(document.getElementById("chart"), {
type: 'bar',
data: {
labels: {{ labels|safe }},
datasets: [{ data: {{ values|safe }} }]
}
});
</script>
